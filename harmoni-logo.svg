<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Harmoni — logo mark (sibling to Primitiv).

    Same equilateral triangle A(50,10) B(11,77.5) C(89,77.5). Three
    concentric triangles scaled 1.0 / 0.55 / 0.325 about the centroid
    (50,55), filled even-odd to give: a bold outer frame, a white ring
    gap, and a small solid inner triangle (one harmonic step).

    The ring gap is 5.06u perpendicular — identical to the gap in the
    Primitiv mark — so the two read as one family.

    Single colour: black on transparent.
  -->
  <path fill="#000" fill-rule="evenodd"
        d="M 50.00 10.00 L 11.00 77.50 L 89.00 77.50 Z
           M 50.00 30.25 L 28.55 67.38 L 71.45 67.38 Z
           M 50.00 40.38 L 37.33 62.31 L 62.67 62.31 Z"/>
</svg>
